<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }
  .game-wrapper {
    background: #16213e;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    border-radius: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .info {
    display: flex;
    justify-content: space-between;
    color: #e0e0e0;
    font-size: 14px;
    margin-top: 10px;
    padding: 0 4px;
  }
  .info button {
    background: #e94560;
    border: none;
    color: white;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    padding: 4px 16px;
    border-radius: 6px;
    cursor: pointer;
  }
  .info button:hover { background: #ff6b81; }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="game" width="400" height="600"></canvas>
  <div class="info">
    <span>Score: <span id="score">0</span></span>
    <span>Best: <span id="best">0</span></span>
    <button id="restart">Restart</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('score');
const bestSpan = document.getElementById('best');

// Constants
const W = 400, H = 600;
const GRAVITY = 0.65;
const FLAP = -9;
const PIPE_W = 55;
const PIPE_GAP = 140;
const PIPE_SPEED = 2.8;
const BIRD_R = 13;

// Game state
let bird, pipes, score, best, frame, gameOver, started;

function reset() {
  bird = { x: 80, y: H/2, vy: 0 };
  pipes = [];
  score = 0;
  frame = 0;
  gameOver = false;
  started = false;
  scoreSpan.textContent = '0';
}

function init() {
  best = parseInt(localStorage.getItem('flappyBest') || '0');
  bestSpan.textContent = best;
  reset();
}

// Collision
function rectCollide(rx, ry, rw, rh, bx, by, br) {
  const cx = Math.max(rx, Math.min(bx, rx + rw));
  const cy = Math.max(ry, Math.min(by, ry + rh));
  const dx = bx - cx, dy = by - cy;
  return (dx * dx + dy * dy) < (br * br);
}

function addPipe() {
  const minY = 80;
  const maxY = H - PIPE_GAP - 80;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({ x: W, topH, scored: false });
}

function update() {
  if (gameOver || !started) return;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  // Check bounds
  if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H) {
    gameOver = true;
    return;
  }

  // Add pipes
  if (frame % 80 === 0) addPipe();
  frame++;

  // Move pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    // Scoring
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      scoreSpan.textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('flappyBest', best);
        bestSpan.textContent = best;
      }
    }

    // Collision
    const birdCx = bird.x, birdCy = bird.y;
    // Top pipe
    if (rectCollide(p.x, 0, PIPE_W, p.topH, birdCx, birdCy, BIRD_R)) {
      gameOver = true; return;
    }
    // Bottom pipe
    if (rectCollide(p.x, p.topH + PIPE_GAP, PIPE_W, H - p.topH - PIPE_GAP, birdCx, birdCy, BIRD_R)) {
      gameOver = true; return;
    }

    // Remove offscreen
    if (p.x + PIPE_W < 0) pipes.splice(i, 1);
  }
}

function draw() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4dc9f6');
  grad.addColorStop(1, '#87ceeb');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 5; i++) {
    const cx = (frame * 0.2 + i * 100) % 500 - 100;
    const cy = 40 + i * 25;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 40, 15, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 20, cy - 5, 30, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = '#228B22';
  ctx.fillRect(0, H - 35, W, 8);

  // Pipes
  for (const p of pipes) {
    // Top pipe body
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(p.x, 0, PIPE_W, p.topH);
    // Top pipe cap
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(p.x - 4, p.topH - 25, PIPE_W + 8, 25);
    // Bottom pipe body
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(p.x, p.topH + PIPE_GAP, PIPE_W, H - p.topH - PIPE_GAP);
    // Bottom pipe cap
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(p.x - 4, p.topH + PIPE_GAP, PIPE_W + 8, 25);
    // Pipe highlights
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(p.x + 8, 0, 8, p.topH);
    ctx.fillRect(p.x + 8, p.topH + PIPE_GAP, 8, H - p.topH - PIPE_GAP);
  }

  // Bird with rotation based on velocity
  const bx = bird.x, by = bird.y;
  const angle = Math.min(Math.max(bird.vy * 0.08, -0.5), 0.8);
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(angle);
  // Body
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
  ctx.fill();
  // Wing
  ctx.fillStyle = '#e67e22';
  const wingAngle = Math.sin(frame * 0.2) * 0.3;
  ctx.save();
  ctx.translate(-4, 2);
  ctx.rotate(wingAngle);
  ctx.fillRect(-2, -12, 6, 16);
  ctx.restore();
  // Eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(6, -4, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.arc(8, -4, 3, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(12, -1);
  ctx.lineTo(22, 3);
  ctx.lineTo(12, 7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Start / Game Over text
  if (!started) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, H/2 - 50, W, 100);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 30px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FLAPPY BIRD', W/2, H/2 - 8);
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('Click or press Space to start', W/2, H/2 + 30);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, H/2 - 40, W, 80);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 + 10);
    ctx.fillStyle = 'white';
    ctx.font = '14px "Courier New", monospace';
    ctx.fillText('Click or press Space to restart', W/2, H/2 + 40);
  }
}

function flap() {
  if (gameOver) {
    reset();
    return;
  }
  if (!started) {
    started = true;
  }
  bird.vy = FLAP;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Events
canvas.addEventListener('click', flap);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    flap();
  }
});
document.getElementById('restart').addEventListener('click', () => {
  reset();
});

init();
loop();
</script>
</body>
</html>
